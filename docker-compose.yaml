# Pulse Docker Compose Configuration

version: '3.8'

services:
  # Pulse Core Service
  pulse:
    build: .
    container_name: pulse
    ports:
      - "8080:8080"  # HTTP API
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    environment:
      - SERVICE_NAME=pulse
      - STORAGE_BACKEND=sqlite
      - OTEL_EXPORTER_OTLP_ENDPOINT=collector:4317
      - LOG_LEVEL=INFO
    volumes:
      - pulse-data:/app/data
      - ./config:/app/config:ro
    depends_on:
      - redis
      - jaeger
    networks:
      - pulse-network
    restart: unless-stopped

  # Redis for distributed caching
  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - pulse-network
    restart: unless-stopped

  # Jaeger for trace visualization
  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: pulse-jaeger
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Thrift HTTP
      - "14250:14250"  # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - pulse-network
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: pulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - pulse-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.1.0
    container_name: pulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - pulse-network
    restart: unless-stopped

  # Example service for testing (Python FastAPI)
  example-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.example
    container_name: pulse-example-api
    ports:
      - "8000:8000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://pulse:4317
      - OTEL_SERVICE_NAME=example-api
      - PULSE_ENDPOINT=http://pulse:8080
    networks:
      - pulse-network
    restart: unless-stopped

volumes:
  pulse-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  pulse-network:
    driver: bridge
