global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'pulse'
    static_configs:
      - targets: ['pulse:8080']
    metrics_path: /metrics

  - job_name: 'example-api'
    static_configs:
      - targets: ['example-api:8000']
